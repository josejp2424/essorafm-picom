######################################################################
#        CONFIGURACIÓN DE ESSORAFM-PICOM                             #
#        Configuración inicial sin transparencia                     #
#        Autor josejp2424                                            #
######################################################################
# ─────── ESQUINAS REDONDEADAS ───────
corner-radius = 15;
rounded-corners-exclude = [
  "class_g = 'Conky'",
  "class_g = 'Plank'",
  "class_g = 'Dunst'",
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
# ─────── SOMBRAS ───────
shadow = true;
shadow-radius = 12;
shadow-opacity = 1;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-exclude = [
  "class_g = 'Plank'",
  "class_g = 'Conky'"
];
# ─────── TRANSPARENCIA ───────
inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = true;
inactive-dim = 0;
focus-exclude = [
];
opacity-rule = [
];
# ─────── BLUR ───────
blur-method = "none";
blur-size = 10;
blur-strength = 5;
blur-background = false;
blur-background-frame = false;
blur-kern = "3x3box";
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];
# ─────── FADING ───────
fading = true;
fade-in-step = 0;
fade-out-step = 0;
fade-delta = 10;
# ─────── GENERAL ───────
backend = "xrender";
vsync = true;
use-damage = true;
log-level = "warn";
mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-rounded-corners = true;
detect-client-opacity = false;
# ─────── WINTYPES ───────
wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 1; focus = true; };
    dock = { shadow = false; };
    dnd = { shadow = false; };
    fullscreen = { fade = true; shadow = true; opacity = 1; focus = true; };
};
